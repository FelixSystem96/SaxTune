app-id: com.felix.saxtune
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: saxtune
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --own-name=org.mpris.MediaPlayer2.saxtune
  - --talk-name=org.freedesktop.DBus

modules:

  - name: dbus-python
    buildsystem: autotools
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/ff/24/63118050c7dd7be04b1ccd60eab53fef00abe844442e1b6dec92dae505d6/dbus-python-1.4.0.tar.gz
        sha256: 991666e498f60dbf3e49b8b7678f5559b8a65034fdf61aae62cdecdb7d89c770

  - name: python3-mutagen
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=. --prefix=/app mutagen-1.47.0-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b0/7a/620f945b96be1f6ee357d211d5bf74ab1b7fe72a9f1525aafbfe3aee6875/mutagen-1.47.0-py3-none-any.whl
        sha256: edd96f50c5907a9539d8e5bba7245f62c9f520aef333d13392a79a4f70aca719

  - name: saxtune
    buildsystem: meson
    sources:
      - type: dir
        path: .
